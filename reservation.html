<!DOCTYPE html>
<html>
<head>
<title>Reservation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="contact">

<form>

<h2>Reserve a Table</h2>

<label>Date</label>
<input type="date">

<label>Time</label>
<select>
<option>12:00</option>
<option>13:00</option>
<option>18:00</option>
<option>20:00</option>
</select>

<label>Guests</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<label>Name</label>
<input type="text">

<label>Email</label>
<input type="email">

<button type="submit">Check Availability</button>

</form>

</section>

</body>
</html>
